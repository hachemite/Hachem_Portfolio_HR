server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Astro Routing: Serve the file, or assume it's an Astro directory, or throw 404
    location / {
        try_files $uri $uri/index.html =404;
    }

    # Custom 404 Page (Points to your Astro 404.html)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # MILITARY-GRADE SECURITY HEADERS (Matches your Cloudflare config)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://res.cloudinary.com https://*.githubusercontent.com https://i.imgur.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.github.com;" always;

    # Cache static assets for 1 year (Astro hashes filenames, so this is safe)
    location ~* \.(?:css|js|webp|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}